<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Element select dan textarea</title>
</head>
<body>
  <form>
    <h3>kamu berasal dari kota mana?</h3>
    <select name="kota" id="kota">
      <option>pilih kota kamu di sini!</option>
      <option value="bdg">Bandung</option>
      <option value="jkt">Jakarta</option>
      <option value="mksr">Makasar</option>
      <option value="jogja">Yogyakarta</option>
      <option value="smr">Semarang</option>
    </select> <br><br>

    <button>kirim!</button> <br>

    <h3>Ceritakan padaku indahnya keluh kesahmu selama di kota asal</h3>
    <textarea name="about" id="about" cols="65" rows="17"></textarea> <br><br>
    <button>submit!</button>
  </form>
</body>
</html>
