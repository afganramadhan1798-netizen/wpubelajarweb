<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coba Elemen Form</title>
</head>
<body>
  <h1>Contoh elemen-elemen form pada HTML</h1>
  
  <form>
    <h3>Element 'nama'</h3>
    <label for="nama">Nama:</label>
    <input type="text" name="nama" placeholder="Masukkan nama" id="nama" autocomplete="off"><br>

    <h3>Element 'email'</h3>
    <label for="email">Email:</label>
    <input type="email" name="email" placeholder="Masukkan email anda" autocomplete="off" id="email"><br>

    <h3>Element 'password'</h3>
    <label for="password">Password:</label>
    <input type="password" name="password" id="password"><br>

    <button type="submit">Kirim!</button> <hr> <br> <br>

    <label for="color">Apa <strong>warna</strong> kesukaan kamu? Coba ganti warna di samping ya ></label>
    <input type="color" name="color" id="color">
    <br><br>

    <label for="number">Kamu suka <strong>angka</strong> berapa?</label>
    <input type="number" name="number" id="number">
    <br> <br>

    <label for="date">Kamu lihat web ini <strong>tanggal</strong> berapa?</label>
    <input type="date" name="date" id="date">
    <br> <br>

    <label for="url">masukin <strong>url</strong> di sini ya!</label>
    <input type="url" name="url" id="url">
    <br><br>

    <label for="tel"></label>
    <input type="tel" name="tel" id="tel">
    <br><br>

    <label for="file"></label>
    <input type="file" name="file" id="file">
    <br><br>

    <label for="radio1">Chose your gander!</label> <br>
    <input type="radio" name="jenis_kelamin" id="radio1" value="Male">
    <label for="radio1">Male</label><br>

    <input type="radio" name="jenis_kelamin" id="radio2" value="Female">
    <label for="radio2">Female</label><br><br>

    <label for="checkbox1">Hobis kamu apa?</label> <br>
    <label for="checkbox1"></label>
    <input type="checkbox" name="hobi" id="checkbox1" value="membaca">
    <label for="checkbox1">Membaca</label><br>

    <input type="checkbox" name="hobi" id="checkbox2" value="berenang">
    <label for="checkbox2">Berenang</label> <br>

    <input type="checkbox" name="hobi" id="checkbox3" value="olahraga">
    <label for="checkbox13">Olahraga</label>
  </form>
</body>
</html>
